<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<style>
body{font-family:-apple-system,system-ui;background:#f5f5f5;margin:0;padding:16px;color:#111}
.header{display:flex;justify-content:space-between;align-items:center;gap:8px}
.section{background:white;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.task{padding:10px;border-bottom:1px solid #eee;border-radius:8px;margin-bottom:6px;transition:all .2s}
button{margin:6px 6px 0 0;border:none;padding:8px 11px;border-radius:8px;font-size:14px}
.done{background:#d4edda}.dismiss{background:#f8d7da}.token{background:#e7f0ff}
.high{background:#ffecec}.medium{background:#fff6e5}.low{background:#f0f0f0}
.status{font-size:13px;color:#555;margin:8px 0 12px}.empty{color:#777;font-size:14px}
</style>
</head>
<body>
<div class="header"><h2>Personal Assistant</h2><button class="token" onclick="setToken()">Token</button></div>
<div id="status" class="status">Loader...</div>
<div class="section"><h3>🔥 Do Today</h3><div id="today"></div></div>
<div class="section"><h3>🟡 Next Up</h3><div id="next"></div></div>
<div class="section"><h3>⚪ Low Priority</h3><div id="low"></div></div>
<script>
const ISSUE_URL='https://api.github.com/repos/Bendecks/Personal-assistent/issues';
function getReviewURL(){return 'https://raw.githubusercontent.com/Bendecks/Personal-assistent/main/data/review.md?cache='+Date.now();}
const statusEl=document.getElementById('status');
function getToken(){return localStorage.getItem('pa_github_token')||'';}
function setToken(){const t=prompt('Indsæt GitHub token med Issues: Read and write',getToken());if(t!==null){localStorage.setItem('pa_github_token',t.trim());statusEl.innerText='Token gemt lokalt.';}}
function cleanTaskText(text){return text.split('|')[0].trim();}
function ensureEmptyState(id){const c=document.getElementById(id);if(!c.children.length){c.innerHTML='<div class="empty">Ingen opgaver</div>';}}
async function sendDecision(action,text,el,container){if(el){el.style.opacity=.45;setTimeout(()=>{el.remove();ensureEmptyState(container);},180);}let token=getToken();if(!token){setToken();token=getToken();}if(!token){statusEl.innerText='Mangler token';return;}const title=action+': '+cleanTaskText(text);statusEl.innerText='Sender...';try{const res=await fetch(ISSUE_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Authorization':'Bearer '+token},body:JSON.stringify({title:title,body:'auto'})});if(!res.ok){const err=await res.text();statusEl.innerText='Fejl '+res.status;alert('GitHub-fejl '+res.status+'\n'+err.slice(0,400));return;}statusEl.innerText='Registreret';}catch(e){statusEl.innerText='Netværksfejl';}}
function createTask(line,container,level){const text=line.replace('- [ ] ','');const el=document.createElement('div');el.className='task '+level;const title=document.createElement('div');title.innerText=text;const actions=document.createElement('div');const done=document.createElement('button');done.className='done';done.innerText='Udført';done.onclick=()=>sendDecision('done',text,el,container);const dismiss=document.createElement('button');dismiss.className='dismiss';dismiss.innerText='Fjern';dismiss.onclick=()=>sendDecision('dismiss',text,el,container);actions.appendChild(done);actions.appendChild(dismiss);el.appendChild(title);el.appendChild(actions);document.getElementById(container).appendChild(el);}
async function load(){document.getElementById('today').innerHTML='';document.getElementById('next').innerHTML='';document.getElementById('low').innerHTML='';const res=await fetch(getReviewURL());const text=await res.text();const lines=text.split('\n');let current=null;const counts={today:0,next:0,low:0};lines.forEach(line=>{if(line.includes('🔥'))current=['today','high'];else if(line.includes('🟡'))current=['next','medium'];else if(line.includes('⚪'))current=['low','low'];if(line.startsWith('- [ ]')&&current){createTask(line,current[0],current[1]);counts[current[0]]++;}});for(const id of ['today','next','low']){if(counts[id]===0){document.getElementById(id).innerHTML='<div class="empty">Ingen opgaver</div>';}}statusEl.innerText=getToken()?'Klar (auto-opdaterer)':'Tryk Token først';}
load();
setInterval(load,5000);
</script>
</body>
</html>
