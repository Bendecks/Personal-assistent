<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<style>
body{font-family:-apple-system,system-ui;background:#f5f5f5;margin:0;padding:16px}
.section{background:white;border-radius:12px;padding:12px;margin-bottom:12px}
.task{padding:10px;border-bottom:1px solid #eee}
button{margin-right:6px;border:none;padding:6px 10px;border-radius:6px}
.done{background:#d4edda}
.dismiss{background:#f8d7da}
.high{background:#ffecec}
.medium{background:#fff6e5}
.low{background:#f0f0f0}
</style>
</head>
<body>
<h2>Personal Assistant</h2>
<div class="section"><h3>🔥 Do Today</h3><div id="today"></div></div>
<div class="section"><h3>🟡 Next Up</h3><div id="next"></div></div>
<div class="section"><h3>⚪ Low Priority</h3><div id="low"></div></div>
<script>
const ISSUE_URL="https://api.github.com/repos/Bendecks/Personal-assistent/issues";
async function sendDecision(action,text){
await fetch(ISSUE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:action+": "+text,body:"auto"})});
alert("Registreret: "+action);
location.reload();
}
function createTask(line,container,level){
const text=line.replace('- [ ] ','');
const el=document.createElement('div');
el.className='task '+level;
const t=document.createElement('div');t.innerText=text;
const a=document.createElement('div');
const d=document.createElement('button');d.className='done';d.innerText='Udført';d.onclick=()=>sendDecision('done',text);
const x=document.createElement('button');x.className='dismiss';x.innerText='Fjern';x.onclick=()=>sendDecision('dismiss',text);
a.appendChild(d);a.appendChild(x);
el.appendChild(t);el.appendChild(a);
document.getElementById(container).appendChild(el);
}
async function load(){
const res=await fetch('https://raw.githubusercontent.com/Bendecks/Personal-assistent/main/data/review.md');
const text=await res.text();
const lines=text.split('\n');
let current=null;
lines.forEach(line=>{
if(line.includes('🔥'))current=['today','high'];
else if(line.includes('🟡'))current=['next','medium'];
else if(line.includes('⚪'))current=['low','low'];
if(line.startsWith('- [ ]')&&current){createTask(line,current[0],current[1]);}
});}
load();
</script>
</body>
</html>
