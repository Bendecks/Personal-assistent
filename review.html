<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<style>
body{font-family:-apple-system,system-ui;background:#f5f5f5;margin:0;padding:16px;color:#111}
.section{background:white;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.task{padding:10px;border-bottom:1px solid #eee;border-radius:8px;margin-bottom:6px}
button{margin:6px 6px 0 0;border:none;padding:8px 11px;border-radius:8px;font-size:14px}
.done{background:#d4edda}
.dismiss{background:#f8d7da}
.high{background:#ffecec}
.medium{background:#fff6e5}
.low{background:#f0f0f0}
.status{font-size:13px;color:#555;margin:8px 0 12px}
.empty{color:#777;font-size:14px}
</style>
</head>
<body>
<h2>Personal Assistant</h2>
<div id="status" class="status">Loader...</div>
<div class="section"><h3>🔥 Do Today</h3><div id="today"></div></div>
<div class="section"><h3>🟡 Next Up</h3><div id="next"></div></div>
<div class="section"><h3>⚪ Low Priority</h3><div id="low"></div></div>
<script>
const SHORTCUT_NAME='Personal Assistent Decision';
const REVIEW_URL='https://raw.githubusercontent.com/Bendecks/Personal-assistent/main/data/review.md?cache='+Date.now();
const statusEl=document.getElementById('status');

function runDecisionShortcut(action,text){
  const command=action+': '+text;
  const url='shortcuts://run-shortcut?name='+encodeURIComponent(SHORTCUT_NAME)+'&input=text&text='+encodeURIComponent(command);
  window.location.href=url;
}

function createTask(line,container,level){
  const text=line.replace('- [ ] ','');
  const el=document.createElement('div');
  el.className='task '+level;
  const title=document.createElement('div');
  title.innerText=text;
  const actions=document.createElement('div');
  const done=document.createElement('button');
  done.className='done';
  done.innerText='Udført';
  done.onclick=()=>runDecisionShortcut('done',text);
  const dismiss=document.createElement('button');
  dismiss.className='dismiss';
  dismiss.innerText='Fjern';
  dismiss.onclick=()=>runDecisionShortcut('dismiss',text);
  actions.appendChild(done);
  actions.appendChild(dismiss);
  el.appendChild(title);
  el.appendChild(actions);
  document.getElementById(container).appendChild(el);
}

async function load(){
  const res=await fetch(REVIEW_URL);
  const text=await res.text();
  const lines=text.split('\n');
  let current=null;
  const counts={today:0,next:0,low:0};

  lines.forEach(line=>{
    if(line.includes('🔥'))current=['today','high'];
    else if(line.includes('🟡'))current=['next','medium'];
    else if(line.includes('⚪'))current=['low','low'];
    if(line.startsWith('- [ ]')&&current){
      createTask(line,current[0],current[1]);
      counts[current[0]]++;
    }
  });

  for(const id of ['today','next','low']){
    if(counts[id]===0){
      document.getElementById(id).innerHTML='<div class="empty">Ingen opgaver.</div>';
    }
  }
  statusEl.innerText='Klar. Knapper åbner Shortcuts.';
}
load();
</script>
</body>
</html>
