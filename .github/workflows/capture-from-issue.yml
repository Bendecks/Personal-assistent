name: Capture from GitHub Issue

on:
  issues:
    types: [opened]

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure data folder
        run: mkdir -p data

      - name: Ensure inbox file exists
        run: touch data/inbox.jsonl

      - name: Capture issue into inbox
        run: node src/capture-issue.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/inbox.jsonl
          git commit -m "Capture issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
