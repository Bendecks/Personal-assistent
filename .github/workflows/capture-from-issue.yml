name: Capture from GitHub Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  capture-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Ensure data files exist
        run: |
          mkdir -p data
          touch data/inbox.jsonl
          touch data/processed.jsonl
          touch data/archive.jsonl

      - name: Capture issue into inbox
        run: node src/capture-issue.js

      - name: Process inbox
        run: npm run process
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build review file
        run: node src/build-review.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.jsonl data/review.md
          git commit -m "Capture, process and build review for issue #${{ github.event.issue.number }}" || echo "No changes"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
